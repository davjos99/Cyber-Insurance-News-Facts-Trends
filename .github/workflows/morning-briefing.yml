# Rename the workflow to reflect its new focus.
# This is what you see under "Actions" in GitHub; it doesn't affect behavior,
# but helps distinguish it from your general cybersec briefing.
name: Morning Cyber Insurance Briefing

on:
  schedule:
    # 9:00 PM UTC daily — still fine, or adjust if you want a different time
    # for the insurance-focused briefing.
    - cron: "00 21 * * *"
  workflow_dispatch:  # allow manual trigger from the Actions tab

permissions:
  # This stays the same: you need write access to contents to commit
  # the generated briefing files back into the repo.
  contents: write

jobs:
  # Job name can stay the same or be changed for clarity, e.g. build-insurance-briefing.
  build-briefing:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Standard checkout of the repo contents so the scripts and skills are available.
        uses: actions/checkout@v4

      - name: Set up Python
        # Keep Python 3.11 unless your scripts require a different version.
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run the chain
        env:
          # Optional — only set if you're using Notion publisher in this insurance repo.
          # If you don't need Notion, you can omit these env vars (or leave them;
          # unused secrets don't break the workflow).
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Optional — only set if you're using WordPress publisher.
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: |
          mkdir -p output
          # KEY CHANGE: Point to a different sources JSON that lists
          # cybersecurity insurance / cyber risk / cyber underwriting sites.
          # For the new repo, create:
          #   skills/cybersec-news-fetcher/assets/templates/cybersec_insurance_sources.json
          # and populate it with insurance-focused feeds.
          python skills/cybersec-news-fetcher/scripts/fetch_feeds.py \
            --sources skills/cybersec-news-fetcher/assets/templates/cybersec_insurance_sources.json \
            --since 24 \
            --output output/raw_news.json

          # Dedupe logic can stay identical; it will now operate on
          # insurance-focused raw news instead of general cybersec.
          python skills/cybersec-news-fetcher/scripts/dedupe.py \
            --input output/raw_news.json \
            --output output/deduped.json

          # Categorizer can still be used, but you may optionally tune it
          # (e.g., add categories like "Policy", "Claims", "Underwriting", "Regulation").
          # For now, it will categorize the insurance articles using your existing logic.
          python skills/news-categorizer/scripts/categorize.py \
            --input output/deduped.json \
            --output output/briefing.md

          # Validation step remains the same; it checks structure / formatting of the briefing.
          python skills/news-categorizer/scripts/validate_briefing.py output/briefing.md || true

          # Publisher still turns the markdown briefing into a static HTML page.
          # Inside this script/template, you can adjust title, fonts, and hero image
          # to say e.g. "Morning Cyber Insurance Briefing".
          python skills/news-page-publisher/scripts/publish_static_html.py \
            --input output/briefing.md \
            --output output/index.html

      - name: Commit briefing
        run: |
          # You can optionally change the bot identity to reflect insurance focus,
          # e.g., "Cyber Insurance Briefing Bot".
          git config user.name "Cyber Insurance Briefing Bot"
          git config user.email "bot@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)

          # Folder structure can remain: each date gets its own .md and .html
          # in briefings/, plus the latest index.html at repo root.
          mkdir -p briefings
          cp output/briefing.md briefings/${DATE}.md
          cp output/index.html briefings/${DATE}.html
          cp output/index.html index.html  # latest at repo root

          # Commit and push the new briefing; if nothing changed,
          # the commit step will no-op.
          git add briefings/ index.html
          git commit -m "Cyber insurance briefing for ${DATE}" || echo "Nothing to commit"
          git push

      - name: Upload artifact (for download)
        # This remains correct: it uploads the contents of output/ as a workflow artifact
        # so you can download the generated files from the Actions run page.
        uses: actions/upload-artifact@v4
        with:
          # Artifact name is tied to the run number; you could rename it to make the
          # insurance focus clear, e.g. "cyber-insurance-briefing-${{ github.run_number }}".
          name: cyber-insurance-briefing-${{ github.run_number }}
          path: output/
